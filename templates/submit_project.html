{% extends "base.html" %}

{% block content %}
<div class="card-glass" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 1rem;">Submit Project Work</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Project: <span style="color: var(--secondary); font-weight: 600;">{{ project.title }}</span></p>

    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Upload Your Work (PDF or Image)</label>
            <input type="file" name="submission_file" class="form-control" required>
            <small style="color: var(--text-muted); display: block; margin-top: 0.5rem;">Please ensure your file is under 5MB.</small>
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn-premium" style="flex: 1;">Upload Submission</button>
            <a href="{{ url_for('student.home') }}" class="btn-premium" style="background: transparent; border: 1px solid var(--glass-border); width: 100px; text-align: center;">Back</a>
        </div>
    </form>
</div>
{% endblock %}
