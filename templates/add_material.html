{% extends "base.html" %}

{% block content %}
<div class="card-glass" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 1rem;">Add Course Material</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Project: <span style="color: var(--secondary); font-weight: 600;">{{ project.title }}</span></p>

    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Material Name</label>
            <input type="text" name="material_name" class="form-control" placeholder="e.g. Chapter 1 Notes" required>
        </div>
        
        <div class="form-group">
            <label>Upload File (PDF/Image)</label>
            <input type="file" name="material_file" class="form-control" required>
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn-premium" style="flex: 1;">Add Material</button>
            <a href="{{ url_for('faculty.admin_dashboard') }}" class="btn-premium" style="background: transparent; border: 1px solid var(--glass-border); width: 100px; text-align: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
