{% extends "base.html" %}

{% block content %}
<div class="card-glass" style="max-width: 450px; margin: 0 auto;">
    <h2 style="margin-bottom: 2rem; text-align: center;">Join CloudEDU</h2>
    <form method="POST">
        <div class="form-group">
            <label>Choose Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-premium" style="width: 100%; margin-top: 1rem;">Create Account</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Already a student? <a href="{{ url_for('auth.login') }}" style="color: var(--secondary);">Login here</a>
    </p>
</div>
{% endblock %}
