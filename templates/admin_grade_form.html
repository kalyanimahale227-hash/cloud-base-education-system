{% extends "base.html" %}

{% block content %}
<div class="card-glass" style="max-width: 700px; margin: 0 auto;">
    <h2 style="margin-bottom: 2rem;">Grade Submission #{{ submission.id }}</h2>
    
    <div style="margin-bottom: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--glass-border);">
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem;">Student: <span style="color: var(--text-white); font-weight: 600;">{{ submission.student.username }}</span></p>
        <p style="font-size: 0.9rem; color: var(--text-muted);">Project: <span style="color: var(--text-white); font-weight: 600;">{{ submission.project.title }}</span></p>
        <div style="margin-top: 1rem;">
            <a href="{{ url_for('static', filename='uploads/' + submission.filename) }}" class="btn-premium" style="background: var(--secondary); padding: 0.5rem 1rem; font-size: 0.85rem;" target="_blank">Download Submission File</a>
        </div>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Numerical Grade (0-100)</label>
            <input type="number" name="grade" class="form-control" min="0" max="100" value="{{ submission.grade if submission.grade else '' }}" required>
        </div>
        
        <div class="form-group">
            <label>Qualitative Feedback</label>
            <textarea name="feedback" class="form-control" style="height: 150px;" required>{{ submission.feedback if submission.feedback else '' }}</textarea>
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn-premium" style="flex: 1;">Save Grade & Notify Student</button>
            <a href="{{ url_for('faculty.admin_submissions_list') }}" class="btn-premium" style="background: transparent; border: 1px solid var(--glass-border); width: 120px; text-align: center;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
